version: "3.9"

services:
  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis/redis-stack:latest   # includes RedisSearch for vector ops
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight UI
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MEMORY_BACKEND: redis
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app/src
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Streamlit frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  redis_data:
